<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Day 28 — Testimonial</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  body { margin: 0; padding: 40px; background: #1a1a1a; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .post {
    width: 1080px; height: 1080px; background: #0A0A0B; color: #F5F4EE;
    position: relative; overflow: hidden;
    box-shadow: 0 20px 80px rgba(0,0,0,0.6);
    padding: 80px; box-sizing: border-box;
    font-family: 'JetBrains Mono', monospace;
  }
  .post::before {
    content: ''; position: absolute; inset: 0;
    background-image:
      linear-gradient(#1F1F22 1px, transparent 1px),
      linear-gradient(90deg, #1F1F22 1px, transparent 1px);
    background-size: 80px 80px; opacity: 0.4;
  }
  .header { position: relative; z-index: 2; display: flex; justify-content: space-between; margin-bottom: 60px; }
  .logo { font-size: 22px; font-weight: 500; }
  .logo .bracket, .logo .dot { color: #D4FF3A; }
  .corner-label { font-size: 14px; letter-spacing: 0.25em; color: #4A4A45; text-transform: uppercase; }

  .eyebrow {
    position: relative; z-index: 2;
    font-size: 13px; letter-spacing: 0.3em; color: #D4FF3A;
    text-transform: uppercase; margin-bottom: 40px;
    display: flex; align-items: center; gap: 14px;
  }
  .eyebrow::before { content: ''; width: 36px; height: 2px; background: #D4FF3A; }

  .quote-mark {
    position: relative; z-index: 2;
    font-family: 'Fraunces', serif;
    font-size: 180px; line-height: 0.7;
    color: #D4FF3A; font-weight: 300;
    margin-bottom: 0px;
  }

  .quote-body {
    position: relative; z-index: 2;
    font-family: 'Fraunces', serif;
    font-size: 44px; font-weight: 400;
    line-height: 1.3; letter-spacing: -0.02em;
    color: #F5F4EE;
    margin-bottom: 50px;
    max-width: 900px;
  }

  .quote-body em {
    color: #D4FF3A; font-style: italic;
  }

  /* Replace-me banner so Tega knows to fill this in */
  .placeholder {
    padding: 20px 24px;
    background: rgba(212,255,58,0.08);
    border: 1px dashed #D4FF3A;
    border-radius: 6px;
    margin-bottom: 30px;
    font-size: 13px; color: #D4FF3A;
    letter-spacing: 0.15em; text-transform: uppercase;
  }

  .attribution {
    position: relative; z-index: 2;
    padding-top: 32px;
    border-top: 1px solid #1F1F22;
    display: flex; justify-content: space-between; align-items: flex-end;
  }

  .client-info { }

  .client-name {
    font-family: 'Fraunces', serif;
    font-size: 28px; font-weight: 500;
    margin-bottom: 6px;
  }

  .client-role {
    font-size: 13px; color: #8B8B85;
    letter-spacing: 0.1em; text-transform: uppercase;
  }

  .project-tag {
    font-size: 11px; letter-spacing: 0.25em;
    color: #D4FF3A; text-transform: uppercase;
    padding: 8px 14px; border: 1px solid #D4FF3A;
    border-radius: 2px;
  }

  .footer {
    position: absolute; bottom: 80px; left: 80px; right: 80px;
    z-index: 2;
    display: flex; justify-content: space-between; align-items: center;
    padding-top: 24px; border-top: 1px solid #1F1F22;
  }
  .footer-label { font-size: 13px; color: #4A4A45; letter-spacing: 0.25em; text-transform: uppercase; }
  .cta-url { font-size: 18px; color: #F5F4EE; font-weight: 500; }
  .cta-url .arrow { color: #D4FF3A; margin-right: 10px; }
</style>
</head>
<body>
<div class="post">
  <div class="header">
    <div class="logo"><span class="bracket">[</span>techturi<span class="dot">.</span><span class="bracket">]</span></div>
    <div class="corner-label">DAY 28 / 30</div>
  </div>

  <div class="eyebrow">Client Testimonial</div>
  <div class="quote-mark">"</div>

  <div class="quote-body">
    Tega delivered our site in <em>three weeks</em> and made something that actually <em>converts.</em> The maintenance plan means I never worry about it breaking.
  </div>

  <div class="attribution">
    <div class="client-info">
      <div class="client-name">— Client Name</div>
      <div class="client-role">Owner · Company Name</div>
    </div>
    <div class="project-tag">WIX STUDIO · 2026</div>
  </div>

  <div class="footer">
    <div class="footer-label">// YOUR PROJECT NEXT</div>
    <div class="cta-url"><span class="arrow">→</span>techturi.org/book</div>
  </div>
</div>
</body>
</html>
