<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Day 30 — Thanks, Here's What's Next</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  body { margin: 0; padding: 40px; background: #1a1a1a; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .post {
    width: 1080px; height: 1080px; background: #0A0A0B; color: #F5F4EE;
    position: relative; overflow: hidden;
    box-shadow: 0 20px 80px rgba(0,0,0,0.6);
    padding: 80px; box-sizing: border-box;
    font-family: 'JetBrains Mono', monospace;
  }
  .post::before {
    content: ''; position: absolute; inset: 0;
    background-image:
      linear-gradient(#1F1F22 1px, transparent 1px),
      linear-gradient(90deg, #1F1F22 1px, transparent 1px);
    background-size: 80px 80px; opacity: 0.4;
  }
  .header { position: relative; z-index: 2; display: flex; justify-content: space-between; margin-bottom: 60px; }
  .logo { font-size: 22px; font-weight: 500; }
  .logo .bracket, .logo .dot { color: #D4FF3A; }
  .corner-label { font-size: 14px; letter-spacing: 0.25em; color: #D4FF3A; text-transform: uppercase; }

  .center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    padding: 0 80px; text-align: center;
    z-index: 2;
  }

  .mega-thanks {
    font-family: 'Fraunces', serif;
    font-size: 180px; font-weight: 300; line-height: 0.95;
    letter-spacing: -0.05em; margin-bottom: 32px;
  }

  .mega-thanks em {
    font-style: italic; color: #D4FF3A;
  }

  .sub {
    font-family: 'Fraunces', serif;
    font-size: 36px; font-weight: 300; line-height: 1.3;
    color: #8B8B85; letter-spacing: -0.01em;
    margin-bottom: 40px;
    max-width: 720px;
  }

  .mission {
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px; color: #F5F4EE;
    padding: 16px 32px;
    border: 1px solid #D4FF3A;
    background: rgba(212,255,58,0.06);
    border-radius: 4px;
    letter-spacing: 0.05em;
  }

  .mission .accent { color: #D4FF3A; }

  .footer {
    position: absolute; bottom: 80px; left: 80px; right: 80px;
    z-index: 2;
    display: flex; justify-content: space-between; align-items: center;
    padding-top: 24px; border-top: 1px solid #1F1F22;
  }
  .footer-label { font-size: 13px; color: #4A4A45; letter-spacing: 0.25em; text-transform: uppercase; }
  .cta-url { font-size: 18px; color: #F5F4EE; font-weight: 500; }
  .cta-url .arrow { color: #D4FF3A; margin-right: 10px; }
</style>
</head>
<body>
<div class="post">
  <div class="header">
    <div class="logo"><span class="bracket">[</span>techturi<span class="dot">.</span><span class="bracket">]</span></div>
    <div class="corner-label">● DAY 30 / 30 · COMPLETE</div>
  </div>

  <div class="center">
    <div class="mega-thanks">
      <em>Thanks.</em>
    </div>
    <div class="sub">
      30 days. 30 posts.<br>
      Every save, every DM, every visit — noticed.
    </div>
    <div class="mission">
      <span class="accent">//</span>&nbsp;&nbsp;NEXT&nbsp;&nbsp;&nbsp;Tell one person.&nbsp;&nbsp;&nbsp;<span class="accent">//</span>
    </div>
  </div>

  <div class="footer">
    <div class="footer-label">// CAMPAIGN 01 · COMPLETE</div>
    <div class="cta-url"><span class="arrow">→</span>techturi.org</div>
  </div>
</div>
</body>
</html>
