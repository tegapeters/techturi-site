<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Day 14 — Week 2 Reflection</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  body { margin: 0; padding: 40px; background: #1a1a1a; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .post {
    width: 1080px; height: 1080px; background: #0A0A0B; color: #F5F4EE;
    position: relative; overflow: hidden;
    box-shadow: 0 20px 80px rgba(0,0,0,0.6);
    padding: 80px; box-sizing: border-box;
    font-family: 'JetBrains Mono', monospace;
  }
  .post::before {
    content: ''; position: absolute; inset: 0;
    background-image:
      linear-gradient(#1F1F22 1px, transparent 1px),
      linear-gradient(90deg, #1F1F22 1px, transparent 1px);
    background-size: 80px 80px; opacity: 0.4;
  }
  .header { position: relative; z-index: 2; display: flex; justify-content: space-between; margin-bottom: 80px; }
  .logo { font-size: 22px; font-weight: 500; }
  .logo .bracket, .logo .dot { color: #D4FF3A; }
  .corner-label { font-size: 18px; letter-spacing: 0.25em; color: #D4FF3A; text-transform: uppercase; }

  .eyebrow {
    position: relative; z-index: 2;
    font-size: 14px; letter-spacing: 0.3em; color: #D4FF3A;
    text-transform: uppercase; margin-bottom: 50px;
    display: flex; align-items: center; gap: 16px;
  }
  .eyebrow::before { content: ''; width: 40px; height: 2px; background: #D4FF3A; }

  .quote-marks {
    position: relative; z-index: 2;
    font-family: 'Fraunces', serif;
    font-size: 140px; line-height: 0.8;
    color: #D4FF3A; font-weight: 300;
    margin-bottom: 20px;
  }

  .learnings {
    position: relative; z-index: 2;
    display: flex; flex-direction: column; gap: 30px;
    margin-bottom: 60px;
  }

  .learning {
    display: flex; align-items: flex-start; gap: 24px;
    padding-bottom: 28px;
    border-bottom: 1px solid #1F1F22;
  }

  .learning:last-child { border-bottom: none; }

  .learning-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px; color: #D4FF3A;
    letter-spacing: 0.2em; padding-top: 10px;
    min-width: 50px;
  }

  .learning-text {
    font-family: 'Fraunces', serif;
    font-size: 32px; font-weight: 400; line-height: 1.3;
    color: #F5F4EE; letter-spacing: -0.01em;
  }

  .learning-text em { color: #D4FF3A; font-style: italic; }

  .footer {
    position: absolute; bottom: 80px; left: 80px; right: 80px;
    z-index: 2;
    display: flex; justify-content: space-between; align-items: center;
    padding-top: 28px; border-top: 1px solid #1F1F22;
  }
  .footer-label { font-size: 13px; color: #4A4A45; letter-spacing: 0.25em; text-transform: uppercase; }
  .cta-url { font-size: 18px; color: #F5F4EE; font-weight: 500; }
  .cta-url .arrow { color: #D4FF3A; margin-right: 10px; }
</style>
</head>
<body>
<div class="post">
  <div class="header">
    <div class="logo"><span class="bracket">[</span>techturi<span class="dot">.</span><span class="bracket">]</span></div>
    <div class="corner-label">DAY 14 / 30 &nbsp;·&nbsp; 01 / 01</div>
  </div>

  <div class="eyebrow">Building In Public</div>
  <div class="quote-marks">"</div>

  <div class="learnings">
    <div class="learning">
      <div class="learning-num">/ 01</div>
      <div class="learning-text">Posts that <em>teach</em> get saved.<br>Saves beat likes.</div>
    </div>
    <div class="learning">
      <div class="learning-num">/ 02</div>
      <div class="learning-text">Posts that <em>brag</em> get ignored.<br>Rightly so.</div>
    </div>
    <div class="learning">
      <div class="learning-num">/ 03</div>
      <div class="learning-text">The best DMs come from <em>people<br>I never expected.</em></div>
    </div>
  </div>

  <div class="footer">
    <div class="footer-label">// WEEK 02 · COMPLETE</div>
    <div class="cta-url"><span class="arrow">→</span>techturi.org</div>
  </div>
</div>
</body>
</html>
